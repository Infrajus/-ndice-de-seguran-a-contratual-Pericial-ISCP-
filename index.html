<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
InfraJus — Painel ISCP
</title>


<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">


<style>

:root{

--camurca:#5A3926;
--camurca2:#7A5235;
--cobre:#B87345;
--cobreClaro:#D7A06A;
--bronze:#8B572F;

--creme:#F5E6D0;
--marrom:#321D12;

--verde:#4D8B57;
--amarelo:#C89A32;
--vermelho:#8B3030;

--sombra:rgba(0,0,0,.35);

}



*{

box-sizing:border-box;

}



body{

margin:0;

min-height:100vh;

font-family:'Inter',sans-serif;

color:var(--marrom);


background:

radial-gradient(
circle at 20% 10%,
rgba(255,220,180,.15),
transparent 35%
),

linear-gradient(
135deg,
#7A5235,
#4B2E20,
#69452E
);


}




/* CABEÇALHO */


.topbar{

padding:30px 45px;


background:

linear-gradient(
145deg,
#2B170D,
#55331F
);


border-bottom:

2px solid var(--cobreClaro);


display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;


box-shadow:

0 15px 40px rgba(0,0,0,.35);

}



.logo{


font-family:'Cormorant Garamond',serif;


font-size:42px;


font-weight:700;


color:#E2B987;


}



.logo span{


color:#C27B49;


}




.subtitle{


font-size:12px;


letter-spacing:4px;


text-transform:uppercase;


color:#D7B68C;


}





/* ÁREA PRINCIPAL */


.container{


max-width:1200px;


margin:auto;


padding:40px 25px 70px;


display:grid;


grid-template-columns:

1fr 1fr;


gap:30px;


}



@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

}




.card{


background:

linear-gradient(
145deg,
rgba(245,225,195,.92),
rgba(220,180,130,.85)
);



border:

2px solid rgba(215,160,106,.8);



border-radius:24px;



padding:32px;



box-shadow:

0 25px 50px var(--sombra),


inset 1px 1px 8px rgba(255,255,255,.45);


}




.card h2{


font-family:'Cormorant Garamond',serif;


font-size:34px;


margin:0 0 10px;


color:#3A2114;


}



.description{


font-size:14px;


line-height:1.6;


color:#583621;


}





/* PAINEL RESULTADO */


.resultado{


position:relative;


overflow:hidden;


background:


linear-gradient(
145deg,
#301B10,
#5A3420
);



color:white;



border:

2px solid var(--cobre);



}




.resultado h2{


color:#F1D2A4;


}



.resultado .description{


color:#D8C0A0;


}





/* MARCA D'ÁGUA */


.justica-bg{


position:absolute;


right:-80px;


top:40px;


width:420px;


opacity:.10;


pointer-events:none;


}




.conteudo{


position:relative;


z-index:2;


}




/* CÍRCULO DO ÍNDICE */


.indice-box{


display:flex;


justify-content:center;


align-items:center;


margin:35px auto;


}





.circulo{


width:210px;


height:210px;


border-radius:50%;


display:flex;


align-items:center;


justify-content:center;


flex-direction:column;



border:12px solid var(--cobreClaro);



background:

rgba(0,0,0,.25);



box-shadow:

0 0 30px rgba(215,160,106,.25);



}



.circulo strong{


font-family:'IBM Plex Mono',monospace;


font-size:45px;


}



.circulo span{


font-size:13px;


letter-spacing:2px;


}





.status{


text-align:center;


font-weight:700;


font-size:18px;


letter-spacing:1px;


margin-top:15px;


}
<!-- ÁREA DE AVALIAÇÃO -->

<div class="card">

<h2>
Avaliação contratual
</h2>

<p class="description">
Responda aos fatores observáveis da contratação para gerar o Índice de Segurança Contratual Pericial.
</p>



<div class="campo">

<label>
1. Existe contrato formal de prestação de serviços?
</label>

<select id="contrato">

<option value="25">
Sim, contrato assinado
</option>

<option value="15">
Contrato enviado, aguardando assinatura
</option>

<option value="5">
Apenas negociação por mensagens
</option>

<option value="0">
Cliente recusou contrato
</option>

</select>

</div>




<div class="campo">

<label>
2. Como será estruturado o pagamento?
</label>


<select id="pagamento">

<option value="25">
Pagamento antecipado integral
</option>

<option value="20">
Entrada + parcelas definidas
</option>

<option value="10">
Entrada reduzida
</option>

<option value="0">
Sem entrada
</option>


</select>


</div>






<div class="campo">

<label>
3. Como foi o comportamento durante a negociação?
</label>


<select id="negociacao">


<option value="20">
Aceitou condições apresentadas
</option>


<option value="15">
Negociou de forma razoável
</option>


<option value="8">
Demonstrou resistência frequente
</option>


<option value="0">
Solicitou início sem garantia financeira
</option>


</select>


</div>







<div class="campo">

<label>
4. Situação documental do caso
</label>


<select id="documentos">


<option value="15">
Documentação completa
</option>


<option value="8">
Documentação parcial
</option>


<option value="3">
Atrasos frequentes
</option>


<option value="0">
Evita fornecer documentos
</option>


</select>


</div>







<div class="campo">

<label>
5. Complexidade e exposição da perícia
</label>


<select id="complexidadeRisco">


<option value="15">
Baixa complexidade
</option>


<option value="10">
Média complexidade
</option>


<option value="5">
Alta complexidade
</option>


<option value="0">
Alta exposição / urgência / grande responsabilidade
</option>


</select>


</div>





<button
class="calcular"
onclick="calcularISCP()">

CALCULAR ISCP

</button>



</div>





<!-- RESULTADO -->


<div class="card resultado">


<img
src="Screenshot_20260708_121250_Chrome.jpg"
class="justica-bg"
alt="Justiça">



<div class="conteudo">


<h2>
Painel ISCP
</h2>


<p class="description">
Índice de segurança da contratação pericial.
</p>



<div class="indice-box">


<div
class="circulo"
id="circulo">


<strong id="pontuacao">
0
</strong>


<span>
/100
</span>


</div>


</div>





<div
class="status"
id="status">

Aguardando análise

</div>





<div class="grafico-area">


<h3>
Distribuição dos fatores
</h3>


<div class="barra">

<span>
Formalização
</span>

<div>

<i id="barraContrato"></i>

</div>

</div>





<div class="barra">

<span>
Financeiro
</span>

<div>

<i id="barraPagamento"></i>

</div>

</div>





<div class="barra">

<span>
Negociação
</span>

<div>

<i id="barraNegociacao"></i>

</div>

</div>





<div class="barra">

<span>
Documentação
</span>

<div>

<i id="barraDocumentos"></i>

</div>

</div>





<div class="barra">

<span>
Complexidade
</span>

<div>

<i id="barraComplexidade"></i>

</div>

</div>



</div>






<div
class="recomendacao"
id="recomendacao">

A recomendação aparecerá após a análise.

</div>



</div>

</div>





<style>


.campo{

margin-bottom:22px;

}



.campo label{

display:block;

font-size:12px;

font-weight:700;

text-transform:uppercase;

letter-spacing:1px;

margin-bottom:7px;

color:#432718;

}




.campo select{


width:100%;


padding:14px;


border-radius:14px;


border:

2px solid var(--cobre);



background:

linear-gradient(
145deg,
#E6C49A,
#C18A55
);



color:#352016;


font-size:14px;


}



.calcular{


width:100%;


padding:16px;


margin-top:15px;


border:none;


border-radius:16px;



background:

linear-gradient(
135deg,
#B87345,
#D7A06A
);



color:white;


font-weight:700;


letter-spacing:2px;


cursor:pointer;



box-shadow:

0 10px 25px rgba(0,0,0,.3);


}



.grafico-area{


margin-top:35px;


}



.grafico-area h3{


font-family:'Cormorant Garamond',serif;


font-size:25px;


color:#E8C99A;


}



.barra{


margin:15px 0;


}



.barra span{


font-size:12px;


color:#E4CBA8;


}



.barra div{


height:10px;


background:rgba(255,255,255,.15);


border-radius:20px;


overflow:hidden;


}



.barra i{


display:block;


height:100%;


width:0;


background:#D7A06A;


border-radius:20px;


transition:1s;


}



.recomendacao{


margin-top:30px;


padding:20px;


border-left:3px solid var(--cobreClaro);


background:rgba(255,255,255,.08);


line-height:1.6;


font-size:14px;


}


</style>
  
<script>


function calcularISCP(){



let contrato =
Number(document.getElementById("contrato").value);



let pagamento =
Number(document.getElementById("pagamento").value);



let negociacao =
Number(document.getElementById("negociacao").value);



let documentos =
Number(document.getElementById("documentos").value);



let complexidade =
Number(document.getElementById("complexidadeRisco").value);





let total =

contrato +

pagamento +

negociacao +

documentos +

complexidade;






document.getElementById("pontuacao")
.innerText = total;






// cálculo dos gráficos individuais


document.getElementById("barraContrato")
.style.width =
(contrato/25*100)+"%";



document.getElementById("barraPagamento")
.style.width =
(pagamento/25*100)+"%";



document.getElementById("barraNegociacao")
.style.width =
(negociacao/20*100)+"%";



document.getElementById("barraDocumentos")
.style.width =
(documentos/15*100)+"%";



document.getElementById("barraComplexidade")
.style.width =
(complexidade/15*100)+"%";






let circulo =
document.getElementById("circulo");



let status =
document.getElementById("status");



let recomendacao =
document.getElementById("recomendacao");





if(total >= 85){



circulo.style.borderColor =
"#4D8B57";



status.style.color =
"#4D8B57";



status.innerHTML =
"🟢 SEGURANÇA CONTRATUAL ELEVADA";



recomendacao.innerHTML =

"Recomendação InfraJus: contratação apresenta boa estrutura de proteção. Manter contrato formal, registro das etapas e condições financeiras estabelecidas.";



}





else if(total >= 60){



circulo.style.borderColor =
"#C89A32";



status.style.color =
"#C89A32";



status.innerHTML =
"🟡 ATENÇÃO CONTRATUAL";



recomendacao.innerHTML =

"Recomendação InfraJus: existem fatores de atenção. Recomenda-se reforçar garantias contratuais, registrar comunicações e evitar alterações informais do acordo.";





}






else{



circulo.style.borderColor =
"#8B3030";



status.style.color =
"#8B3030";



status.innerHTML =
"🔴 SEGURANÇA CONTRATUAL REDUZIDA";



recomendacao.innerHTML =

"Recomendação InfraJus: foram identificados fatores relevantes de vulnerabilidade contratual. Recomenda-se revisar as condições financeiras antes do início dos trabalhos periciais.";





}





}




</script>



</body>

</html>
