<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ISCP | InfraJus</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@300;400&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --grafite: #2d2d2d;
            --cobre: #b87333;
            --ouro: #d4af37;
            --creme: #e0d8c3;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--creme); 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
            margin: 0; 
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin: 0; color: var(--cobre); }
        header p { font-size: 1rem; letter-spacing: 1.5px; color: var(--creme); font-weight: 300; margin-top: 5px; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .container { grid-template-columns: 1fr 350px; }
        }

        .panel { 
            background: var(--grafite); 
            padding: 25px; 
            border-radius: 10px; 
            border: 1px solid var(--cobre); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
        }

        h2 { 
            font-family: 'Cormorant Garamond', serif; 
            color: var(--ouro); 
            border-bottom: 1px solid var(--cobre); 
            padding-bottom: 10px; 
            font-size: 1.5rem; 
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; color: var(--creme); }
        
        select {
            width: 100%;
            padding: 12px;
            background: #222;
            color: var(--creme);
            border: 1px solid var(--cobre);
            border-radius: 5px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            cursor: pointer;
        }

        #result-display {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }

        .circle {
            width: 150px;
            height: 150px;
            border: 6px solid var(--ouro);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 2.5rem;
            color: var(--ouro);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .status-text { font-weight: bold; font-size: 1.1rem; margin-top: 10px; color: var(--ouro); text-transform: uppercase; }
        .recommendation { margin-top: 20px; font-style: italic; color: var(--creme); font-size: 1rem; line-height: 1.5; }
    </style>
</head>
<body>

    <header>
        <h1>Painel ISCP</h1>
        <p>Índice de Segurança Contratual Pericial</p>
    </header>

    <div class="container">
        <div class="panel">
            <h2>Avaliação de Parâmetros</h2>
            <div id="form-container"></div>
        </div>

        <div class="panel">
            <h2>Resultado</h2>
            <div id="result-display">
                <div class="circle" id="score-circle">0</div>
                <div id="status" class="status-text">AGUARDANDO</div>
                <div id="rec" class="recommendation">Selecione as condições contratuais ao lado.</div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { id: 'formal', label: '1. Formalização Contratual', options: {25: 'Contrato assinado', 15: 'Aguardando assinatura', 5: 'Somente mensagens', 0: 'Recusa de contrato'} },
            { id: 'financeiro', label: '2. Segurança Financeira', options: {25: 'Pagamento antecipado', 20: 'Entrada + parcelas', 10: 'Entrada reduzida', 0: 'Sem entrada'} },
            { id: 'negocial', label: '3. Comportamento Negocial', options: {20: 'Aceita condições', 15: 'Negociação razoável', 8: 'Resistência frequente', 0: 'Início sem garantia'} },
            { id: 'doc', label: '4. Organização Documental', options: {15: 'Documentos completos', 8: 'Parcial', 3: 'Atrasos', 0: 'Evita fornecer'} },
            { id: 'complex', label: '5. Complexidade e Exposição', options: {15: 'Baixa', 10: 'Média', 5: 'Alta', 0: 'Grande urgência/exposição'} }
        ];

        const container = document.getElementById('form-container');
        questions.forEach(q => {
            let html = `<div class="input-group"><label>${q.label}</label><select id="${q.id}" onchange="calculate()">`;
            html += `<option value="0">Selecione...</option>`;
            for(let val in q.options) html += `<option value="${val}">${q.options[val]}</option>`;
            html += `</select></div>`;
            container.innerHTML += html;
        });

        function calculate() {
            let total = 0;
            questions.forEach(q => total += parseInt(document.getElementById(q.id).value));
            
            const circle = document.getElementById('score-circle');
            const status = document.getElementById('status');
            const rec = document.getElementById('rec');
            
            circle.innerText = total;
            
            if(total >= 85) {
                circle.style.borderColor = '#4CAF50';
                status.style.color = '#4CAF50';
                status.innerText = 'SEGURANÇA ELEVADA';
                rec.innerText = 'Manter contrato formal, registro das etapas e condições financeiras estabelecidas.';
            } else if(total >= 60) {
                circle.style.borderColor = '#FFC107';
                status.style.color = '#FFC107';
                status.innerText = 'ATENÇÃO CONTRATUAL';
                rec.innerText = 'Reforçar garantias contratuais e evitar alterações informais.';
            } else {
                circle.style.borderColor = '#B71C1C';
                status.style.color = '#B71C1C';
                status.innerText = 'SEGURANÇA REDUZIDA';
                rec.innerText = 'Recomenda-se revisar as condições financeiras antes do início dos trabalhos.';
            }
        }
    </script>
</body>
</html>
