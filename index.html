<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ISCP | InfraJus</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@300;400&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2b1d16;
            --panel-color: #4B2E20;
            --copper: #B87345;
            --gold: #D7A06A;
            --cream: #F2D8B3;
            --text-main: #F2D8B3;
        }

        body {
            background: radial-gradient(circle at center, #6B4630 0%, #2b1d16 100%);
            color: var(--cream);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin: 0; color: var(--gold); }
        header p { font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; color: var(--copper); }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .panel {
            background: rgba(75, 46, 32, 0.7);
            border: 1px solid var(--copper);
            padding: 30px;
            border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        h2 { font-family: 'Cormorant Garamond', serif; border-bottom: 1px solid var(--copper); padding-bottom: 10px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; }
        select {
            width: 100%;
            padding: 10px;
            background: #3a251a;
            border: 1px solid var(--copper);
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        #result-display {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .circle {
            width: 150px;
            height: 150px;
            border: 8px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 2rem;
        }

        .status-text { font-weight: bold; margin-top: 10px; }
        .recommendation { margin-top: 20px; font-style: italic; color: #d1b899; }
    </style>
</head>
<body>

    <header>
        <h1>Painel ISCP</h1>
        <p>Índice de Segurança Contratual Pericial | InfraJus</p>
    </header>

    <div class="container">
        <div class="panel">
            <h2>Avaliação</h2>
            <div id="form-container"></div>
        </div>

        <div class="panel">
            <h2>Resultado</h2>
            <div id="result-display">
                <div class="circle" id="score-circle">0</div>
                <div id="status" class="status-text">-</div>
                <div id="rec" class="recommendation">Preencha os dados para análise.</div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { id: 'formal', label: 'Formalização Contratual', options: {25: 'Contrato assinado', 15: 'Aguardando assinatura', 5: 'Somente mensagens', 0: 'Recusa de contrato'} },
            { id: 'financeiro', label: 'Segurança Financeira', options: {25: 'Pagamento antecipado', 20: 'Entrada + parcelas', 10: 'Entrada reduzida', 0: 'Sem entrada'} },
            { id: 'negocial', label: 'Comportamento Negocial', options: {20: 'Aceita condições', 15: 'Negociação razoável', 8: 'Resistência frequente', 0: 'Início sem garantia'} },
            { id: 'doc', label: 'Organização Documental', options: {15: 'Documentos completos', 8: 'Parcial', 3: 'Atrasos', 0: 'Evita fornecer'} },
            { id: 'complex', label: 'Complexidade', options: {15: 'Baixa', 10: 'Média', 5: 'Alta', 0: 'Grande urgência/exposição'} }
        ];

        const container = document.getElementById('form-container');
        questions.forEach(q => {
            let html = `<div class="input-group"><label>${q.label}</label><select id="${q.id}" onchange="calculate()">`;
            for(let val in q.options) html += `<option value="${val}">${q.options[val]}</option>`;
            html += `</select></div>`;
            container.innerHTML += html;
        });

        function calculate() {
            let total = 0;
            questions.forEach(q => total += parseInt(document.getElementById(q.id).value));
            
            const circle = document.getElementById('score-circle');
            const status = document.getElementById('status');
            const rec = document.getElementById('rec');
            
            circle.innerText = total;
            
            if(total >= 85) {
                circle.style.borderColor = '#4CAF50';
                status.innerText = 'SEGURANÇA CONTRATUAL ELEVADA';
                rec.innerText = 'Manter contrato formal, registro das etapas e condições financeiras estabelecidas.';
            } else if(total >= 60) {
                circle.style.borderColor = '#FFC107';
                status.innerText = 'ATENÇÃO CONTRATUAL';
                rec.innerText = 'Reforçar garantias contratuais e evitar alterações informais.';
            } else {
                circle.style.borderColor = '#B71C1C';
                status.innerText = 'SEGURANÇA CONTRATUAL REDUZIDA';
                rec.innerText = 'Recomenda-se revisar as condições financeiras antes do início dos trabalhos.';
            }
        }
    </script>
</body>
</html>
